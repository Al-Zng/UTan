name: Build UTan Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Project Generator
      run: python3 generate_project.py

    - name: Build Unsigned IPA using xcodebuild
      run: |
        xcodebuild -project UTan/UTan.xcodeproj \
                   -scheme UTan \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   CONFIGURATION_BUILD_DIR=$(pwd)/build-output \
                   clean build

    - name: Package Application into Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build-output/UTan.app Payload/
        zip -r UTan_Unsigned.ipa Payload

    - name: Upload Unsigned IPA Product Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UTan_Unsigned_IPA
        path: UTan_Unsigned.ipa
