name: Build UTan Premium Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run Project Generator
      run: python3 generate_project.py

    # إنشاء نموذج CoreData يدوياً (لأن generate_project.py لا ينشئ ملفات xcdatamodeld)
    - name: Create CoreData Model
      run: |
        cd UTan/UTan
        mkdir -p UTanDataModel.xcdatamodeld
        cat > UTanDataModel.xcdatamodeld/contents << 'EOF'
        <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
        <model type="com.apple.IDECoreDataModeler.DataModel" documentVersion="1.0" lastSavedToolsVersion="21513" systemVersion="20G1420" minimumToolsVersion="Automatic" sourceLanguage="Swift" userDefinedModelVersionIdentifier="">
        <entity name="WatchHistory" representedClassName="WatchHistory" syncable="YES">
        <attribute name="duration" optional="YES" attributeType="Double" defaultValueString="0.0" usesScalarValueType="YES"/>
        <attribute name="imageUrl" optional="YES" attributeType="String"/>
        <attribute name="timestamp" optional="YES" attributeType="Double" defaultValueString="0.0" usesScalarValueType="YES"/>
        <attribute name="title" optional="YES" attributeType="String"/>
        <attribute name="videoId" optional="YES" attributeType="String"/>
        </entity>
        <elements>
        <element name="WatchHistory" positionX="-63" positionY="-18" width="128" height="134"/>
        </elements>
        </model>
        EOF
        cd ../..

    - name: Build Unsigned IPA using xcodebuild
      run: |
        xcodebuild -project UTan/UTan.xcodeproj \
                   -scheme UTan \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   -derivedDataPath ./build \
                   -quiet \
                   build

    - name: Find .app and Package IPA
      run: |
        # البحث عن ملف التطبيق داخل derived data
        APP_PATH=$(find ./build -name "UTan.app" -type d -print -quit)
        if [ -z "$APP_PATH" ]; then
          echo "❌ UTan.app not found!"
          exit 1
        fi
        echo "✅ Found app at: $APP_PATH"
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r UTan_Premium.ipa Payload

    - name: Upload Unsigned IPA Product Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UTan_Premium_IPA
        path: UTan_Premium.ipa
